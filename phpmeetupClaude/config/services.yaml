# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    shipping.volumetric_divisor: 5000
    shipping.priority_multiplier: 1.5
    shipping.regular_delivery_days_base: 3
    shipping.priority_delivery_days_base: 2
    shipping.max_weight:
        regular: 30
        priority: 30
    shipping.max_dimension:
        regular: 150
        priority: 150

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Repository interface → implementation bindings
    App\Repository\PostalCodeRepositoryInterface:
        alias: App\Repository\PostalCodeRepository

    App\Repository\WeightTariffRepositoryInterface:
        alias: App\Repository\WeightTariffRepository

    # Calculator interface → implementation binding
    App\Service\ShippingPriceCalculatorInterface:
        alias: App\Service\ShippingPriceCalculator

    # Typed ShippingConfiguration value object built from shipping.yaml parameters
    App\Config\ShippingConfiguration:
        arguments:
            $volumetricDivisor: '%shipping.volumetric_divisor%'
            $priorityMultiplier: '%shipping.priority_multiplier%'
            $regularDeliveryDaysBase: '%shipping.regular_delivery_days_base%'
            $priorityDeliveryDaysBase: '%shipping.priority_delivery_days_base%'
            $maxWeight: '%shipping.max_weight%'
            $maxDimension: '%shipping.max_dimension%'
