# Croatian shipping zones based on geographic region
zones:
    mainland:
        id: 'mainland'
        label: 'Mainland'
        surcharge: 0.00
        delivery_days_base: 2
        postal_codes:
            - '10000'-'10999'
            - '20000'-'29999'
            - '31000'-'38999'
            - '40000'-'49999'
            - '51000'-'52999'

    island:
        id: 'island'
        label: 'Island'
        surcharge: 3.50
        delivery_days_base: 3
        postal_codes:
            - '23240'
            - '52460'
            - '51230'-'51299'
            - '52570'
            - '20230'

    remote:
        id: 'remote'
        label: 'Remote/Mountain'
        surcharge: 5.00
        delivery_days_base: 4
        postal_codes: []